<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Faire une offre</title>
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
    <style>
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f7ff; } /* Survol bleu très pâle */

        /* INPUTS FORMULAIRES */
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-btn);
            background-color: #fafafa;
            font-size: 1rem;
            box-sizing: border-box; /* Important pour les marges */
        }

        input:focus, select:focus {
            border-color: var(--secondary-teal);
            outline: none;
            background-color: white;
        }

        /* Specific styles */
        .sports { display: flex; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
        .sport { margin: 5px; padding: 5px 10px; background: white; border-radius: 5px; color: var(--text-dark); border: 1px solid #ddd; }
        .login-btn { position: absolute; top: 10px; right: 10px; padding: 10px 20px; background: var(--accent-orange); color: white; border: none; border-radius: var(--radius-btn); cursor: pointer; }
        .login-btn:hover { background: #e64a19; }
        .header h1 { color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Proposition de Transfert</h2>
        <p>Vous souhaitez recruter : <strong>{{ joueur[0] }} {{ joueur[1] }}</strong></p>
        
        <form method="POST">
            <label>Montant proposé (€) :</label>
            <input type="number" name="montant" placeholder="Ex: 1500" required>

            <label>Type de contrat :</label>
            <select name="type_mutation">
                <option value="Transfert">Achat définitif</option>
                <option value="Pret">Prêt (1 saison)</option>
            </select>

            <button type="submit">Envoyer la proposition à la Ligue</button>
        </form>
        
        <br>
        <a href="/mercato">Annuler</a>
    </div>
</body>
</html>
