<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faire une offre - Mouv'Sport</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="brand">
            <a href="/" class="brand-link">
                <img src="{{ url_for('static', path='img/logo.png') }}" alt="Logo Mouv'Sport" class="logo-img">
                <h1>Mouv'Sport</h1>
            </a>
        </div>
        <a href="/mercato" class="btn btn-secondary">← Retour Mercato</a>
    </header>

    <main class="container" style="max-width: 520px;">
        <div class="card" style="border-top: 4px solid var(--spicy-orange);">
            <div style="text-align:center; margin-bottom: 25px;">
                <div style="background: linear-gradient(135deg, var(--ocean-blue), var(--lagoon-teal)); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 1.5rem;">
                    📨
                </div>
                <h2 style="margin:0; font-size: 1.5rem;">Proposition de Transfert</h2>
                <p style="color: var(--text-grey); margin-top: 8px;">
                    Joueur ciblé : <strong style="color: var(--ocean-blue);">{{ joueur[0] }} {{ joueur[1] }}</strong>
                </p>
            </div>

            <form method="POST">
                <label>Montant proposé (€)</label>
                <input type="number" name="montant" placeholder="Ex : 1500" required min="0">

                <label>Type de contrat</label>
                <select name="type_mutation">
                    <option value="Transfert">Achat définitif</option>
                    <option value="Pret">Prêt (1 saison)</option>
                </select>

                <button type="submit" class="btn btn-action" style="width:100%; margin-top: 10px; padding: 14px;">
                    Envoyer l'offre au club
                </button>
            </form>

            <div style="text-align:center; margin-top: 15px;">
                <a href="/mercato" style="color: var(--text-grey); font-size: 0.9rem;">Annuler</a>
            </div>
        </div>
    </main>
</body>
</html>
