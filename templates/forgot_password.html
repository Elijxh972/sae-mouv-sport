<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - Mouv'Sport</title>
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', path='img/logo.png') }}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-box">
        <a href="/login" class="btn-home">← Retour à la connexion</a>
        <h2>Mot de passe oublié</h2>
        <p style="color:var(--text-grey); font-size:0.9rem; margin-bottom:10px;">Entrez votre identifiant, vous recevrez un lien de réinitialisation par email.</p>

        <form action="/forgot-password" method="POST">
            {% if erreur %}
            <div style="background:#fff0f0; color:#c62828; border:1px solid #ffcdd2; border-radius:8px; padding:10px 14px; font-size:0.88rem;">❌ {{ erreur }}</div>
            {% endif %}
            {% if succes %}
            <div style="background:#f0fff4; color:#2e7d32; border:1px solid #c8e6c9; border-radius:8px; padding:10px 14px; font-size:0.88rem;">✅ {{ succes }}</div>
            {% endif %}

            <label>Identifiant :</label>
            <input type="text" name="login" placeholder="Votre identifiant" required>

            <button type="submit" class="btn btn-login">Envoyer le lien</button>
        </form>
    </div>
</body>
</html>
