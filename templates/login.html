<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mouv'Sport</title>
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-box">
        <a href="/" class="btn-home">← Retour à l'accueil</a>
        <h2>Connexion Mouv'Sport</h2>
        
        <form action="/login" method="POST">
            
            {% if erreur %}
            <div style="background:#fff0f0; color:#c62828; border:1px solid #ffcdd2; border-radius:8px; padding:10px 14px; font-size:0.88rem;">❌ {{ erreur }}</div>
            {% endif %}

            <label for="login">Identifiant :</label>
            <input type="text" name="login" placeholder="Ex: admin" required>

            <label for="password">Mot de passe :</label>
            <input type="password" name="password" placeholder="Mot de passe" required>

            <button type="submit" class="btn btn-login">Se connecter</button>
        </form>

        <div class="help-text">
            <p>Pas encore inscrit ? <a href="/register">Créer un compte</a></p>
        </div>
    </div>

</body>
</html>
