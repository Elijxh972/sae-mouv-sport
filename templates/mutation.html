<!DOCTYPE html>
<html>
<head>
    <title>Nouvelle Mutation</title>
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
    <style>
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f7ff; } /* Survol bleu très pâle */

        /* INPUTS FORMULAIRES */
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-btn);
            background-color: #fafafa;
            font-size: 1rem;
            box-sizing: border-box; /* Important pour les marges */
        }

        input:focus, select:focus {
            border-color: var(--secondary-teal);
            outline: none;
            background-color: white;
        }

        /* Specific styles */
        .sports { display: flex; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
        .sport { margin: 5px; padding: 5px 10px; background: white; border-radius: 5px; color: var(--text-dark); border: 1px solid #ddd; }
        .login-btn { position: absolute; top: 10px; right: 10px; padding: 10px 20px; background: var(--accent-orange); color: white; border: none; border-radius: var(--radius-btn); cursor: pointer; }
        .login-btn:hover { background: #e64a19; }
        .header h1 { color: white; }
    </style>
</head>
<body>
    <h1>Enregistrer une Mutation</h1>
    
    <form method="POST">
        <label>Sélectionnez le Joueur :</label>
        <select name="joueur" required>
            {% for j in joueurs %}
                <option value="{{ j[0] }}">{{ j[1] }} {{ j[2] }}</option>
            {% endfor %}
        </select>

        <label>Club d'arrivée (Acheteur) :</label>
        <select name="club_arrivee" required>
            {% for c in clubs %}
                <option value="{{ c[0] }}">{{ c[1] }}</option>
            {% endfor %}
        </select>

        <label>Montant du Transfert (€) :</label>
        <input type="number" name="montant" placeholder="Ex: 1500" step="0.01" required>

        <label>Type de mutation :</label>
        <select name="type_mutation">
            <option value="Transfert">Transfert Définitif</option>
            <option value="Pret">Prêt</option>
        </select>

        <button type="submit">Valider la transaction</button>
    </form>
    
    <p><a href="/">Retour à l'accueil</a></p>
</body>
</html>
