{% from 'macros/auth_fields.html' import password_with_toggle %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Mouv'Sport</title>
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-box">
        <a href="/" class="btn-home">← Accueil</a>
        <h2>Créer un compte</h2>
        
        <form action="/register" method="POST">
            <label>Identifiant :</label>
            <input type="text" name="login" placeholder="Ex : pseudo123" required>

            <label for="password">Mot de passe :</label>
            {{ password_with_toggle('password', 'Mot de passe', 'password', true) }}

            <label>Club :</label>
            <select name="id_club" required>
                <option value="">Sélectionner votre club</option>
                {% for c in clubs %}
                    <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>

            <button type="submit" class="btn btn-register">S'inscrire</button>
        </form>
        
        <div class="help-text" style="text-align: center; margin-top: 15px;">
            Déjà inscrit ? <a href="/login">Se connecter</a>
        </div>
    </div>
    <script src="{{ url_for('static', path='js/password-toggle.js') }}"></script>
</body>
</html>
