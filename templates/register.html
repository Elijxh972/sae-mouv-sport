<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Mouv'Sport</title>
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-box">
        <h2>Créer un compte</h2>
        <form method="POST">
            <label for="login">Identifiant :</label>
            <input type="text" name="login" placeholder="Ex : golden_fc" required>

            <label for="password">Mot de passe :</label>
            <input type="password" name="password" placeholder="Mot de passe" required>

            <label for="role">Rôle :</label>
            <select name="role" required>
                <option value="">Choisir un rôle</option>
                <option value="RESP_CLUB">Responsable de club</option>
                <option value="JOUEUR">Joueur licencié</option>
            </select>

            <!-- Application dédiée au football : le sport est automatiquement "Football" côté serveur -->

            <label for="id_club">Club :</label>
            <select name="id_club" required>
                <option value="">Sélectionner un club</option>
                {% for c in clubs %}
                    <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>

            <button type="submit" class="btn btn-register">S'inscrire</button>
        </form>
        <div class="help-text">
            Déjà un compte ? <a href="/login">Se connecter</a>
        </div>
    </div>
</body>
</html>
