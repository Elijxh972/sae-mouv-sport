<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - Mouv'Sport</title>
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-box">
        <h2>Nouveau mot de passe</h2>

        <form action="/reset-password/{{ token }}" method="POST">
            {% if erreur %}
            <div style="background:#fff0f0; color:#c62828; border:1px solid #ffcdd2; border-radius:8px; padding:10px 14px; font-size:0.88rem;">❌ {{ erreur }}</div>
            {% endif %}

            <label>Nouveau mot de passe :</label>
            <input type="password" name="password" placeholder="Nouveau mot de passe" required minlength="6">

            <label>Confirmer :</label>
            <input type="password" name="confirm" placeholder="Confirmer le mot de passe" required minlength="6">

            <button type="submit" class="btn btn-login">Réinitialiser</button>
        </form>
    </div>
</body>
</html>
